version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: qq
    main: ./cmd/qq
    binary: qq
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/mscansian/qq/internal/cli.Version={{.Version}}

archives:
  - id: qq
    formats: [binary]
    name_template: "qq-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  header:
    from_file:
      path: ./release-header.md
