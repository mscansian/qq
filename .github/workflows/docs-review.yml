name: docs-review

on:
  push:
    branches: [main]
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'

permissions:
  contents: read

jobs:
  review:
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install qq
        env:
          QQ_VERSION: v0.3.0
        run: |
          curl -fsSL "https://github.com/mscansian/qq/releases/download/${QQ_VERSION}/qq-linux-amd64" \
            -o /usr/local/bin/qq && chmod +x /usr/local/bin/qq
      - name: Review .md diff
        env:
          QQ_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QQ_BASE_URL: https://api.openai.com/v1
          QQ_MODEL: gpt-5.4-mini
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE"
            head="$PR_HEAD"
          else
            base="$PUSH_BEFORE"
            head="$PUSH_AFTER"
          fi
          git diff "$base" "$head" -- '*.md' \
            | qq --unless "any typos, grammar errors, or broken markdown syntax in the added lines?"
